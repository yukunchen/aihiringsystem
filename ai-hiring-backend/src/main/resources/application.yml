spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/aihiring}
    username: ${DB_USERNAME:aihiring}
    password: ${DB_PASSWORD:aihiring}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

storage:
  local:
    base-dir: ${STORAGE_BASE_DIR:./uploads}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 7200000
  refresh-token-expiration: 604800000

admin:
  default-password: ${ADMIN_DEFAULT_PASSWORD}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
