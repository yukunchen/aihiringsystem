spring:
  datasource:
    url: jdbc:h2:mem:aihiring;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: true
  flyway:
    enabled: false
  server:
    address: 0.0.0.0

jwt:
  secret: dev-secret-key-must-be-at-least-32-characters-long-for-hs256!
  access-token-expiration: 7200000
  refresh-token-expiration: 604800000

admin:
  default-password: admin123

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

test:
  secret: ${TEST_SECRET:}
