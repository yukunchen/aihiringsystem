name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Git commit SHA to deploy'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      resolved_version: ${{ steps.resolve.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve version to full SHA
        id: resolve
        run: |
          INPUT="${{ inputs.version }}"
          if ! SHA=$(git rev-parse --verify "${INPUT}^{commit}" 2>/dev/null); then
            echo "::error::Cannot resolve '${INPUT}' to a commit SHA"
            exit 1
          fi
          echo "Resolved '${INPUT}' -> ${SHA}"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
      - name: Verify images exist in registry
        env:
          SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          set -e
          for IMG in ai-hiring-backend ai-matching-service ai-hiring-frontend; do
            REF="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${IMG}:${SHA}"
            echo "Checking ${REF}..."
            if ! docker manifest inspect "${REF}" > /dev/null 2>&1; then
              echo "::error::Image not found in registry: ${REF}"
              exit 1
            fi
          done
          echo "All images verified."

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    outputs:
      previous_version: ${{ steps.set_version.outputs.previous }}
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Save current version
        id: save_version
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          capture_stdout: true
          script: |
            grep "IMAGE_TAG=" /opt/ai-hiring/docker/prod/.env 2>/dev/null | cut -d= -f2 || echo "unknown"
      - name: Set previous version output
        id: set_version
        run: |
          PREV=$(echo "${{ steps.save_version.outputs.stdout }}" | head -1 | tr -d '[:space:]')
          echo "previous=${PREV:-unknown}" >> "$GITHUB_OUTPUT"
      - name: Copy deploy scripts to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "scripts/deploy.sh,scripts/health-check.sh,scripts/rollback.sh"
          target: /tmp/ai-hiring-scripts
      - name: Deploy to Production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: OPENAI_API_KEY,GHCR_TOKEN
          script: |
            cp /tmp/ai-hiring-scripts/scripts/deploy.sh /opt/ai-hiring/scripts/deploy.sh
            cp /tmp/ai-hiring-scripts/scripts/health-check.sh /opt/ai-hiring/scripts/health-check.sh
            cp /tmp/ai-hiring-scripts/scripts/rollback.sh /opt/ai-hiring/scripts/rollback.sh
            chmod +x /opt/ai-hiring/scripts/deploy.sh /opt/ai-hiring/scripts/health-check.sh /opt/ai-hiring/scripts/rollback.sh
            export OPENAI_API_KEY="$OPENAI_API_KEY"
            /opt/ai-hiring/scripts/deploy.sh prod ${{ needs.verify.outputs.resolved_version }} "$GHCR_TOKEN"
      - name: Health check
        run: |
          sleep 45
          BACKEND_BASE="http://${{ secrets.VPS_HOST }}:8080"
          AI_BASE="http://${{ secrets.VPS_HOST }}:8000"

          echo "Checking backend liveliness..."
          BACKEND_CODE=$(curl -s -o /tmp/prod-backend-health.txt -w "%{http_code}" \
            "$BACKEND_BASE/api/auth/login" \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{}')

          if [ "$BACKEND_CODE" -ge 200 ] && [ "$BACKEND_CODE" -lt 500 ]; then
            echo "Backend reachable (HTTP $BACKEND_CODE)"
          else
            echo "Backend health check failed (HTTP $BACKEND_CODE)"
            cat /tmp/prod-backend-health.txt || true
            exit 1
          fi

          echo "Checking AI service /health..."
          curl -sf "$AI_BASE/health" > /dev/null || {
            echo "AI service health check failed"
            exit 1
          }

          echo "Production deployment successful"

      - name: Notify orchestrator (success)
        if: success()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: SHA,RUN_URL
          script: |
            python3 << 'PYEOF'
            import json, datetime, os
            entry = {
              'id': 'prod-' + os.environ['SHA'][:7],
              'timestamp': datetime.datetime.utcnow().isoformat() + 'Z',
              'read': False,
              'type': 'deploy',
              'target': 'orchestrator',
              'message': f"🚀 Production Deploy Complete — commit {os.environ['SHA'][:7]}",
              'details': 'Backend + AI service health checks passed.',
              'run_url': os.environ.get('RUN_URL', '')
            }
            queue = '/opt/ai-hiring/notifications/orchestrator-queue.jsonl'
            os.makedirs(os.path.dirname(queue), exist_ok=True)
            with open(queue, 'a') as f:
                f.write(json.dumps(entry) + '\n')
            PYEOF
        env:
          SHA: ${{ needs.verify.outputs.resolved_version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  rollback:
    needs: [verify, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Rollback to previous version
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            echo "Production deploy failed - initiating rollback..."
            /opt/ai-hiring/scripts/rollback.sh prod "${{ needs.deploy.outputs.previous_version }}" || echo "Rollback failed - manual intervention required"
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

      - name: Notify orchestrator (rolled back)
        if: always()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: SHA,PREV,RUN_URL,ROLLBACK_RESULT
          script: |
            python3 << 'PYEOF'
            import json, datetime, os
            ok = os.environ.get('ROLLBACK_RESULT') == 'success'
            sha = os.environ['SHA'][:7]
            prev = (os.environ.get('PREV') or '')[:7]
            entry = {
              'id': 'prod-rollback-' + sha,
              'timestamp': datetime.datetime.utcnow().isoformat() + 'Z',
              'read': False,
              'type': 'deploy_fail',
              'target': 'orchestrator',
              'message': (
                  f"🔄 Production Rolled Back — {sha} → {prev}" if ok
                  else f"🚨 Production Deploy FAILED and rollback FAILED — {sha} (manual action required)"
              ),
              'details': (
                  f'Deploy of {sha} failed health checks; rolled back to {prev}.'
                  if ok else
                  f'Deploy of {sha} failed AND rollback also failed. Production may be in a broken state.'
              ),
              'run_url': os.environ.get('RUN_URL', '')
            }
            queue = '/opt/ai-hiring/notifications/orchestrator-queue.jsonl'
            os.makedirs(os.path.dirname(queue), exist_ok=True)
            with open(queue, 'a') as f:
                f.write(json.dumps(entry) + '\n')
            PYEOF
        env:
          SHA: ${{ needs.verify.outputs.resolved_version }}
          PREV: ${{ needs.deploy.outputs.previous_version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ROLLBACK_RESULT: ${{ job.status }}

  alert:
    needs: [verify, deploy, rollback]
    if: always() && needs.deploy.result == 'failure'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create production alert issue
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ needs.verify.outputs.resolved_version }}'.substring(0, 7);
            const prevSha = '${{ needs.deploy.outputs.previous_version }}'.substring(0, 7);
            const runUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';
            const rollbackStatus = '${{ needs.rollback.result }}';

            const title = `Production deploy failed and rolled back: ${sha}`;
            const body = `## Production Deployment Failure\n\n` +
              `- **Attempted version**: \`${{ needs.verify.outputs.resolved_version }}\`\n` +
              `- **Rolled back to**: \`${{ needs.deploy.outputs.previous_version }}\`\n` +
              `- **Rollback status**: ${rollbackStatus}\n` +
              `- **Workflow run**: ${runUrl}\n\n` +
              `**IMMEDIATE ACTION REQUIRED** - investigate before re-deploying.\n\n` +
              `This issue was auto-created by the production deploy failure handler.`;

            // Ensure label exists
            try {
              await octokit.rest.issues.getLabel({...context.repo, name: 'deployment'});
            } catch (e) {
              await octokit.rest.issues.createLabel({
                ...context.repo,
                name: 'deployment',
                color: 'e99695',
                description: 'Deployment related issue'
              });
            }

            await octokit.rest.issues.create({
              ...context.repo,
              title: title,
              body: body,
              labels: ['bug', 'deployment']
            });
