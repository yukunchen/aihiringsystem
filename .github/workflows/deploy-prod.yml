name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Git commit SHA to deploy'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Verify images exist
        run: |
          echo "Verifying images for version ${{ inputs.version }}"
          echo "Backend: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-hiring-backend:${{ inputs.version }}"
          echo "AI Service: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-matching-service:${{ inputs.version }}"
          echo "Frontend: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-hiring-frontend:${{ inputs.version }}"

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    steps:
      - name: Deploy to Production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: OPENAI_API_KEY,GHCR_TOKEN
          script: |
            export OPENAI_API_KEY="$OPENAI_API_KEY"
            /opt/ai-hiring/scripts/deploy.sh prod ${{ inputs.version }} "$GHCR_TOKEN"
      - name: Health check
        run: |
          sleep 45
          BACKEND_BASE="http://${{ secrets.VPS_HOST }}:8080"
          AI_BASE="http://${{ secrets.VPS_HOST }}:8000"

          echo "Checking backend liveliness..."
          BACKEND_CODE=$(curl -s -o /tmp/prod-backend-health.txt -w "%{http_code}" \
            "$BACKEND_BASE/api/auth/login" \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{}')

          if [ "$BACKEND_CODE" -ge 200 ] && [ "$BACKEND_CODE" -lt 500 ]; then
            echo "Backend reachable (HTTP $BACKEND_CODE)"
          else
            echo "Backend health check failed (HTTP $BACKEND_CODE)"
            cat /tmp/prod-backend-health.txt || true
            exit 1
          fi

          echo "Checking AI service /health..."
          curl -sf "$AI_BASE/health" > /dev/null || {
            echo "AI service health check failed"
            exit 1
          }

          echo "Production deployment successful"
