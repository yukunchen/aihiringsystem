name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          git diff "$BASE_SHA" "$HEAD_SHA" > /tmp/pr-diff.txt
          DIFF_SIZE=$(wc -c < /tmp/pr-diff.txt)
          echo "diff_size=$DIFF_SIZE" >> $GITHUB_OUTPUT
          if [ "$DIFF_SIZE" -gt 102400 ]; then
            head -c 102400 /tmp/pr-diff.txt > /tmp/pr-diff-truncated.txt
            mv /tmp/pr-diff-truncated.txt /tmp/pr-diff.txt
          fi

      - name: AI Review with Claude
        id: review
        if: steps.diff.outputs.diff_size > 0
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, subprocess, os

          with open("/tmp/pr-diff.txt", "r") as f:
              diff_content = f.read()

          if not diff_content.strip():
              with open("/tmp/review-comment.md", "w") as f:
                  f.write("No diff to review.")
              exit(0)

          payload = {
              "model": "claude-sonnet-4-20250514",
              "max_tokens": 4096,
              "system": (
                  "You are a senior code reviewer for an AI-powered hiring platform. "
                  "The project has 3 services: Spring Boot backend (ai-hiring-backend/), "
                  "Python FastAPI AI service (ai-matching-service/), React frontend (frontend/). "
                  "Review for: "
                  "1) Security issues (SQL injection, XSS, auth bypass, secrets in code) "
                  "2) Code quality and error handling "
                  "3) Architecture boundary violations "
                  "Be concise. Only flag actionable issues. Use bullet points. "
                  "If the diff looks fine, say 'LGTM' briefly."
              ),
              "messages": [{"role": "user", "content": f"Review this PR diff:\n\n{diff_content}"}]
          }

          resp = subprocess.run(
              ["curl", "-s", "https://api.anthropic.com/v1/messages",
               "-H", "Content-Type: application/json",
               "-H", f"x-api-key: {os.environ['ANTHROPIC_API_KEY']}",
               "-H", "anthropic-version: 2023-06-01",
               "-d", json.dumps(payload)],
              capture_output=True, text=True
          )

          try:
              data = json.loads(resp.stdout)
              blocks = data.get("content", [])
              texts = [b["text"] for b in blocks if b["type"] == "text"]
              review_text = "\n".join(texts)
          except Exception:
              review_text = "AI review failed to parse response."

          with open("/tmp/review-comment.md", "w") as f:
              f.write(review_text)
          PYEOF

      - name: Post review comment
        if: steps.review.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "## AI Code Review

          $(cat /tmp/review-comment.md)

          ---
          *Generated by Claude AI*"
