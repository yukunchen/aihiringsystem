name: Deploy Staging

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./ai-hiring-backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-hiring-backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-hiring-backend:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./ai-matching-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-matching-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-matching-service:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-hiring-frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-hiring-frontend:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: OPENAI_API_KEY,GHCR_TOKEN
          command_timeout: 15m
          script: |
            export OPENAI_API_KEY="$OPENAI_API_KEY"
            /opt/ai-hiring/scripts/deploy.sh staging ${{ github.sha }} "$GHCR_TOKEN"

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Smoke test staging
        id: smoke
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          BASE="http://${VPS_HOST}:8082"
          PASS=true
          DETAILS=""

          # 1. Login
          LOGIN=$(curl -sf -X POST "$BASE/api/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"admin123"}' || echo '{}')
          TOKEN=$(echo "$LOGIN" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('accessToken',''))" 2>/dev/null)

          if [ -z "$TOKEN" ]; then
            PASS=false
            DETAILS="${DETAILS}\n- ❌ Login failed"
          else
            DETAILS="${DETAILS}\n- ✅ Login"
          fi

          # 2. Resume upload
          if [ -n "$TOKEN" ]; then
            echo "smoke test resume" > /tmp/smoke.txt
            UPLOAD=$(curl -sf -X POST "$BASE/api/resumes/upload" \
              -H "Authorization: Bearer $TOKEN" \
              -F "file=@/tmp/smoke.txt;type=text/plain" || echo '{}')
            CODE=$(echo "$UPLOAD" | python3 -c "import sys,json; print(json.load(sys.stdin).get('code',''))" 2>/dev/null)
            if [ "$CODE" = "200" ]; then
              DETAILS="${DETAILS}\n- ✅ Resume upload"
            else
              PASS=false
              DETAILS="${DETAILS}\n- ❌ Resume upload (response: $CODE)"
            fi
          fi

          # 3. Jobs list
          if [ -n "$TOKEN" ]; then
            JOBS=$(curl -sf "$BASE/api/jobs" \
              -H "Authorization: Bearer $TOKEN" || echo '{}')
            JCODE=$(echo "$JOBS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('code',''))" 2>/dev/null)
            if [ "$JCODE" = "200" ]; then
              DETAILS="${DETAILS}\n- ✅ Jobs list"
            else
              PASS=false
              DETAILS="${DETAILS}\n- ❌ Jobs list (response: $JCODE)"
            fi
          fi

          echo "pass=$PASS" >> $GITHUB_OUTPUT
          echo "details<<EOF" >> $GITHUB_OUTPUT
          printf "$DETAILS" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment on linked issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PASS: ${{ steps.smoke.outputs.pass }}
          DETAILS: ${{ steps.smoke.outputs.details }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # Extract issue numbers from commit message (e.g. "closes #21", "fixes #19")
          ISSUES=$(echo "$COMMIT_MSG" | grep -oiE '(closes?|fixes?|resolves?) #[0-9]+' | grep -oE '#[0-9]+' | tr -d '#' || true)

          if [ -z "$ISSUES" ]; then
            echo "No linked issues found in commit message, skipping comment"
            exit 0
          fi

          if [ "$PASS" = "true" ]; then
            ICON="✅"
            STATUS="Staging smoke tests **passed**"
          else
            ICON="❌"
            STATUS="Staging smoke tests **failed**"
          fi

          BODY="${ICON} **Staging Deploy Complete** — commit \`${SHA:0:7}\`

${STATUS}

**Checks:**
${DETAILS}

[View deployment run](${RUN_URL})"

          for ISSUE in $ISSUES; do
            gh issue comment "$ISSUE" \
              --repo "${{ github.repository }}" \
              --body "$BODY"
            echo "Commented on issue #$ISSUE"
          done

      - name: Notify Claude Code on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: PASS,SHA,DETAILS,RUN_URL
          script: |
            if [ "$PASS" = "true" ]; then
              MSG="✅ Staging Deploy Complete — commit ${SHA:0:7}"
            else
              MSG="❌ Staging Deploy FAILED — commit ${SHA:0:7}"
            fi
            python3 -c "
            import json, datetime
            entry = {
              'id': '${SHA:0:7}',
              'timestamp': datetime.datetime.utcnow().isoformat() + 'Z',
              'read': False,
              'message': '$MSG',
              'details': '$DETAILS',
              'run_url': '$RUN_URL'
            }
            with open('/opt/ai-hiring/notifications/queue.jsonl', 'a') as f:
                f.write(json.dumps(entry) + '\n')
            "
        env:
          PASS: ${{ steps.smoke.outputs.pass }}
          SHA: ${{ github.sha }}
          DETAILS: ${{ steps.smoke.outputs.details }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
