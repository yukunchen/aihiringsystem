name: Deploy Staging

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./ai-hiring-backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-hiring-backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-hiring-backend:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./ai-matching-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-matching-service:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-matching-service:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-hiring-frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-hiring-frontend:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Copy deploy scripts to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "scripts/deploy.sh,scripts/health-check.sh"
          target: /tmp/ai-hiring-scripts
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: OPENAI_API_KEY,GHCR_TOKEN
          command_timeout: 15m
          script: |
            cp /tmp/ai-hiring-scripts/scripts/deploy.sh /opt/ai-hiring/scripts/deploy.sh
            cp /tmp/ai-hiring-scripts/scripts/health-check.sh /opt/ai-hiring/scripts/health-check.sh
            chmod +x /opt/ai-hiring/scripts/deploy.sh /opt/ai-hiring/scripts/health-check.sh
            export OPENAI_API_KEY="$OPENAI_API_KEY"
            /opt/ai-hiring/scripts/deploy.sh staging ${{ github.sha }} "$GHCR_TOKEN"

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    outputs:
      smoke_passed: ${{ steps.smoke.outputs.pass }}
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Smoke test staging
        id: smoke
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          BASE="http://${VPS_HOST}:8082"
          PASS=true
          DETAILS=""

          # 1. Login
          LOGIN=$(curl -sf -X POST "$BASE/api/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"admin123"}' || echo '{}')
          TOKEN=$(echo "$LOGIN" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('accessToken',''))" 2>/dev/null)

          if [ -z "$TOKEN" ]; then
            PASS=false
            DETAILS="${DETAILS}\n- ❌ Login failed"
          else
            DETAILS="${DETAILS}\n- ✅ Login"
          fi

          # 1b. Diagnostics - show user permissions
          if [ -n "$TOKEN" ]; then
            ME=$(curl -s "$BASE/api/auth/me" -H "Authorization: Bearer $TOKEN" || echo '{}')
            echo "DEBUG /api/auth/me: $(echo "$ME" | head -c 1000)"
            ME_PERMS=$(echo "$ME" | python3 -c "import sys,json; d=json.load(sys.stdin).get('data',{}); print('roles:', d.get('roles',[]), 'perms:', d.get('permissions',[]))" 2>/dev/null || echo "parse-failed")
            echo "DEBUG permissions: $ME_PERMS"
          fi

          # 2. Resume upload
          if [ -n "$TOKEN" ]; then
            echo "smoke test resume" > /tmp/smoke.txt
            UPLOAD=$(curl -sf -X POST "$BASE/api/resumes/upload" \
              -H "Authorization: Bearer $TOKEN" \
              -F "file=@/tmp/smoke.txt;type=text/plain" || echo '{}')
            CODE=$(echo "$UPLOAD" | python3 -c "import sys,json; print(json.load(sys.stdin).get('code',''))" 2>/dev/null)
            if [ "$CODE" = "200" ]; then
              DETAILS="${DETAILS}\n- ✅ Resume upload"
            else
              PASS=false
              DETAILS="${DETAILS}\n- ❌ Resume upload (response: $CODE)"
            fi
          fi

          # 3. Departments list (verbose - show raw response for debugging)
          if [ -n "$TOKEN" ]; then
            DEPT_HTTP=$(curl -s -o /tmp/depts.json -w "%{http_code}" "$BASE/api/departments" \
              -H "Authorization: Bearer $TOKEN")
            DEPTS=$(cat /tmp/depts.json 2>/dev/null || echo '{}')
            echo "DEBUG departments: HTTP=$DEPT_HTTP body=$(echo "$DEPTS" | head -c 500)"
            DCODE=$(echo "$DEPTS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('code',''))" 2>/dev/null || true)
            DCOUNT=$(echo "$DEPTS" | python3 -c "import sys,json; d=json.load(sys.stdin).get('data',[]); print(len(d))" 2>/dev/null || true)
            DNAMES=$(echo "$DEPTS" | python3 -c "import sys,json; d=json.load(sys.stdin).get('data',[]); print(', '.join(x.get('name','') for x in d))" 2>/dev/null || true)
            if [ "$DEPT_HTTP" = "200" ] && [ "$DCOUNT" -gt 0 ] 2>/dev/null; then
              DETAILS="${DETAILS}\n- ✅ Departments list ($DCOUNT: $DNAMES)"
            else
              PASS=false
              DETAILS="${DETAILS}\n- ❌ Departments list (HTTP=$DEPT_HTTP, code=$DCODE, count=$DCOUNT, body=$(echo "$DEPTS" | head -c 200))"
            fi
          fi

          # 4. Jobs list
          if [ -n "$TOKEN" ]; then
            JOBS=$(curl -sf "$BASE/api/jobs" \
              -H "Authorization: Bearer $TOKEN" || echo '{}')
            JCODE=$(echo "$JOBS" | python3 -c "import sys,json; print(json.load(sys.stdin).get('code',''))" 2>/dev/null)
            if [ "$JCODE" = "200" ]; then
              DETAILS="${DETAILS}\n- ✅ Jobs list"
            else
              PASS=false
              DETAILS="${DETAILS}\n- ❌ Jobs list (response: $JCODE)"
            fi
          fi

          echo "pass=$PASS" >> $GITHUB_OUTPUT
          echo "details<<EOF" >> $GITHUB_OUTPUT
          printf "$DETAILS" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Resolve linked issues
        id: linked
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Primary: use GitHub's native PR→issue linkage (captures "Fixes #N"
          # from the PR body, which GitHub squash-merges strip out). The merge
          # commit contains "(#<PR>)" from the PR number.
          PR_NUM=$(echo "$COMMIT_MSG" | head -1 | grep -oE '\(#[0-9]+\)' | tail -1 | tr -d '(#)' || true)
          ISSUES=""
          if [ -n "$PR_NUM" ]; then
            ISSUES=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" \
              --json closingIssuesReferences \
              --jq '.closingIssuesReferences[].number' 2>/dev/null || true)
          fi

          # Fallback: broaden regex to catch "issue #N", "fix #N", "(#N)", bare
          # "#N" in the subject — covers PR titles that forgot "Fixes #N".
          if [ -z "$ISSUES" ]; then
            ISSUES=$(echo "$COMMIT_MSG" \
              | grep -oiE '(closes?|fixes?|resolves?|issues?) ?#[0-9]+|\(#[0-9]+\)|#[0-9]+' \
              | grep -oE '#[0-9]+' | tr -d '#' \
              | sort -u || true)
            # Exclude the PR number itself from the fallback results
            if [ -n "$PR_NUM" ]; then
              ISSUES=$(echo "$ISSUES" | grep -v "^${PR_NUM}$" || true)
            fi
          fi

          ISSUES=$(echo "$ISSUES" | tr '\n' ' ' | xargs)
          echo "issues=$ISSUES" >> "$GITHUB_OUTPUT"
          echo "Linked issues: ${ISSUES:-<none>}"

      - name: Comment on linked issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PASS: ${{ steps.smoke.outputs.pass }}
          DETAILS: ${{ steps.smoke.outputs.details }}
          ISSUES: ${{ steps.linked.outputs.issues }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$ISSUES" ]; then
            echo "No linked issues resolved, skipping comment"
            exit 0
          fi

          if [ "$PASS" = "true" ]; then
            ICON="✅"
            STATUS="Staging smoke tests **passed**"
          else
            ICON="❌"
            STATUS="Staging smoke tests **failed**"
          fi

          BODY="${ICON} **Staging Deploy Complete** — commit \`${SHA:0:7}\`"$'\n\n'"${STATUS}"$'\n\n'"**Checks:**"$'\n'"${DETAILS}"$'\n\n'"[View deployment run](${RUN_URL})"

          for ISSUE in $ISSUES; do
            gh issue comment "$ISSUE" \
              --repo "${{ github.repository }}" \
              --body "$BODY"
            echo "Commented on issue #$ISSUE"
          done

      - name: Notify orchestrator on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: PASS,SHA,DETAILS,RUN_URL
          script: |
            if [ "$PASS" = "true" ]; then
              export MSG="✅ Staging Deploy Complete — commit ${SHA:0:7}"
              export NTYPE="deploy"
            else
              export MSG="❌ Staging Deploy FAILED — commit ${SHA:0:7}"
              export NTYPE="deploy_fail"
            fi
            # Write to the orchestrator queue so both the Discord watcher
            # and the orchestrator Claude hook pick it up; the fixer does
            # not need to know about deploy events.
            python3 << 'PYEOF'
            import json, datetime, os
            entry = {
              'id': 'staging-' + os.environ['SHA'][:7],
              'timestamp': datetime.datetime.utcnow().isoformat() + 'Z',
              'read': False,
              'type': os.environ['NTYPE'],
              'target': 'orchestrator',
              'message': os.environ.get('MSG', ''),
              'details': os.environ.get('DETAILS', ''),
              'run_url': os.environ.get('RUN_URL', '')
            }
            queue = '/opt/ai-hiring/notifications/orchestrator-queue.jsonl'
            os.makedirs(os.path.dirname(queue), exist_ok=True)
            with open(queue, 'a') as f:
                f.write(json.dumps(entry) + '\n')
            PYEOF
        env:
          PASS: ${{ steps.smoke.outputs.pass }}
          SHA: ${{ github.sha }}
          DETAILS: ${{ steps.smoke.outputs.details }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Trigger Verifier Agent on VPS
        if: steps.smoke.outputs.pass == 'true' && steps.linked.outputs.issues != ''
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: ISSUES
          command_timeout: 2m
          script: |
            for ISSUE in $ISSUES; do
              ISSUE_BODY=$(gh issue view "$ISSUE" --repo "${{ github.repository }}" --json body -q '.body' 2>/dev/null || echo "")
              LOG="/opt/ai-hiring/logs/verify-issue-${ISSUE}.log"
              nohup /opt/ai-hiring/scripts/verify-issue.sh \
                "$ISSUE" "http://localhost:8082" "$ISSUE_BODY" \
                >> "$LOG" 2>&1 &
              echo "Launched verifier for issue #$ISSUE (PID $!) — log: $LOG"
            done
        env:
          ISSUES: ${{ steps.linked.outputs.issues }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  e2e:
    needs: verify
    if: needs.verify.outputs.smoke_passed == 'true'
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: e2e-tests/package-lock.json
      - name: Install dependencies
        working-directory: e2e-tests
        run: npm ci
      - name: Install Playwright browsers
        working-directory: e2e-tests
        run: npx playwright install chromium
      - name: Run E2E tests
        working-directory: e2e-tests
        run: npx playwright test
        env:
          BASE_URL: http://${{ secrets.VPS_HOST }}:3002
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: staging-e2e-test-results
          path: e2e-tests/playwright-report/

  report-failure:
    # Include earlier jobs so a build-and-push failure (e.g., the Gradle
    # timeout on da531b7) also triggers this — previously the needs list
    # only covered deploy/verify and such early failures were invisible
    # to the report handler.
    needs: [ci, build-and-push, deploy, verify]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Determine failed stage
        id: stage
        run: |
          # Use job result inputs to name the first failing stage so the
          # issue body and Discord ping are actionable.
          if [ "${{ needs.ci.result }}" = "failure" ]; then
            echo "stage=ci" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.build-and-push.result }}" = "failure" ]; then
            echo "stage=build-and-push" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.deploy.result }}" = "failure" ]; then
            echo "stage=deploy" >> "$GITHUB_OUTPUT"
          elif [ "${{ needs.verify.result }}" = "failure" ]; then
            echo "stage=verify" >> "$GITHUB_OUTPUT"
          else
            echo "stage=unknown" >> "$GITHUB_OUTPUT"
          fi

      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '${{ github.sha }}'.substring(0, 7);
            const stage = '${{ steps.stage.outputs.stage }}';
            const runUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';
            const title = `Staging deploy failed at ${stage}: commit ${sha}`;
            const body = `## Deployment Failure\n\n` +
              `- **Environment**: staging\n` +
              `- **Failed stage**: \`${stage}\`\n` +
              `- **Branch**: master\n` +
              `- **Commit**: \`${{ github.sha }}\`\n` +
              `- **Workflow run**: ${runUrl}\n\n` +
              `This issue was auto-created by the deploy failure handler.`;

            try {
              await octokit.rest.issues.getLabel({...context.repo, name: 'deployment'});
            } catch (e) {
              await octokit.rest.issues.createLabel({
                ...context.repo,
                name: 'deployment',
                color: 'e99695',
                description: 'Deployment related issue'
              });
            }

            await octokit.rest.issues.create({
              ...context.repo,
              title: title,
              body: body,
              labels: ['bug', 'deployment']
            });

      - name: Notify orchestrator (failure)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: SHA,STAGE,RUN_URL
          script: |
            python3 << 'PYEOF'
            import json, datetime, os
            sha = os.environ['SHA'][:7]
            stage = os.environ['STAGE']
            entry = {
              'id': 'staging-fail-' + sha,
              'timestamp': datetime.datetime.utcnow().isoformat() + 'Z',
              'read': False,
              'type': 'deploy_fail',
              'target': 'orchestrator',
              'message': f"❌ Staging Deploy FAILED at {stage} — commit {sha}",
              'details': f"Stage `{stage}` failed for staging deploy of {sha}. "
                         f"An auto-issue has been filed with run logs.",
              'run_url': os.environ.get('RUN_URL', '')
            }
            queue = '/opt/ai-hiring/notifications/orchestrator-queue.jsonl'
            os.makedirs(os.path.dirname(queue), exist_ok=True)
            with open(queue, 'a') as f:
                f.write(json.dumps(entry) + '\n')
            PYEOF
        env:
          SHA: ${{ github.sha }}
          STAGE: ${{ steps.stage.outputs.stage }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
