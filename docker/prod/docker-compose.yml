version: '3.8'
services:
  frontend:
    image: ${REGISTRY}/${IMAGE_PREFIX}/ai-hiring-frontend:${IMAGE_TAG}
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=/api
    restart: always
    networks:
      - prod-internal

  backend:
    image: ${REGISTRY}/${IMAGE_PREFIX}/ai-hiring-backend:${IMAGE_TAG}
    ports:
      - "${BACKEND_PORT}:8080"
    environment:
      - DB_URL=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_DRIVER=org.postgresql.Driver
      - AI_MATCHING_BASE_URL=http://ai-matching:8001
      - JWT_SECRET=${JWT_SECRET}
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_FLYWAY_ENABLED=true
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
    depends_on:
      - ai-matching
    restart: always
    # Persist uploaded resume files across container recreates — without
    # a volume here, every redeploy wipes /app/uploads and download
    # endpoints return 404 for all pre-existing resumes (issue #143).
    volumes:
      - prod-resume-uploads:/app/uploads
    networks:
      - prod-internal
      - ai-hiring-network

  ai-matching:
    image: ${REGISTRY}/${IMAGE_PREFIX}/ai-matching-service:${IMAGE_TAG}
    env_file:
      - /opt/ai-hiring/secrets/prod.env
    ports:
      - "${AI_PORT}:8001"
    environment:
      - LLM_MODEL=gpt-4o
      - EMBEDDING_MODEL=text-embedding-3-small
      - QDRANT_HOST=${QDRANT_HOST}
      - QDRANT_PORT=${QDRANT_PORT}
      - QDRANT_COLLECTION_PREFIX=prod
    restart: always
    networks:
      - prod-internal
      - ai-hiring-network

networks:
  prod-internal:
  ai-hiring-network:
    external: true

volumes:
  prod-resume-uploads:
