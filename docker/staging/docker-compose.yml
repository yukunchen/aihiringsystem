version: '3.8'
services:
  frontend:
    image: ${REGISTRY}/${IMAGE_PREFIX}/ai-hiring-frontend:${IMAGE_TAG}
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=/api
    restart: unless-stopped
    networks:
      - staging-internal
  backend:
    image: ${REGISTRY}/${IMAGE_PREFIX}/ai-hiring-backend:${IMAGE_TAG}
    ports:
      - "${BACKEND_PORT}:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - AI_MATCHING_BASE_URL=http://ai-matching:8001
      - MINIO_ENDPOINT=http://${MINIO_HOST}:${MINIO_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - SPRING_PROFILES_ACTIVE=staging
      - JAVA_OPTS=-XX:TieredStopAtLevel=1 -Xms256m -Xmx512m
    depends_on:
      - ai-matching
    restart: unless-stopped
    networks:
      - staging-internal
      - ai-hiring-network
  ai-matching:
    image: ${REGISTRY}/${IMAGE_PREFIX}/ai-matching-service:${IMAGE_TAG}
    env_file:
      - /opt/ai-hiring/secrets/staging.env
    ports:
      - "${AI_PORT}:8001"
    environment:
      - LLM_MODEL=gpt-4o-mini
      - EMBEDDING_MODEL=text-embedding-3-small
      - QDRANT_HOST=${QDRANT_HOST}
      - QDRANT_PORT=${QDRANT_PORT}
      - QDRANT_COLLECTION_PREFIX=staging
    restart: unless-stopped
    networks:
      - staging-internal
      - ai-hiring-network

networks:
  staging-internal:
  ai-hiring-network:
    external: true
